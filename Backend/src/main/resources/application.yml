# Here we define the OAuth verification details



server:
    tomcat:
        threads:
            max: 5000
        max-connections: 100000
        accept-count: 10000

spring:
    threads:
        virtual:
            enabled: true
    datasource:
        hikari:
            # SAFETY LIMIT: Neon free tier restricts connections. 
            # 15 is safe to prevent "too many clients" database crashes.
            maximum-pool-size: 15
            minimum-idle: 2
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
                        scope:
                            - email
                            - profile
                    github:
                        client-id: ${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
                        client-secret: ${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
                        scope:
                            - user:email
                            - read:user
    data:
        redis:
            url: ${REDIS_URL}
            repositories:
                enabled: false
    mail:
        host: ${MAIL_HOST:smtp.gmail.com}
        port: ${MAIL_PORT:587}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true

# Swagger/OpenAPI Configuration
springdoc:
    swagger-ui:
        path: /swagger-ui.html
        enabled: true
        operations-sorter: method
        tags-sorter: alpha
    api-docs:
        path: /v3/api-docs

# Resilience4j Rate Limiter Configuration
resilience4j:
    ratelimiter:
        configs:
            default:
                limitRefreshPeriod: 1m
                limitForPeriod: 30
                timeoutDuration: 1s
        instances:
            globalRateLimiter:
                baseConfig: default
            authRateLimiter:
                limitRefreshPeriod: 1m
                limitForPeriod: 30
                timeoutDuration: 1s
            userRateLimiter:
                limitRefreshPeriod: 1m
                limitForPeriod: 30
                timeoutDuration: 1s
            readOnlyRateLimiter:
                limitRefreshPeriod: 1m
                limitForPeriod: 40
                timeoutDuration: 1s
            adminRateLimiter:
                limitRefreshPeriod: 1m
                limitForPeriod: 80
                timeoutDuration: 1s

app:
    redis:
        cache:
            prefix: "hms:v1:"
            default-ttl: 60m
            ttl:
                bookedSlots: 5m
                appointmentDetails: 15m
                doctorAppointments: 10m
                patientAppointments: 10m
                recentAdminAppointments: 10m
                doctorById: 30m
                doctorListPaged: 30m
                patientById: 30m
                departmentById: 30m
    oauth2:
        redirect-uri: ${FRONTEND_URL:http://localhost:5173}/oauth2/callback

management:
    endpoints:
        web:
            exposure:
                include: health,info

    endpoint:
        health:
            show-details: when_authorized
            probes:
                enabled: true   # enables liveness + readiness

            group:
                readiness:
                    include: db, stripe, appointment, redis
                liveness:
                    include: ping, system
        
