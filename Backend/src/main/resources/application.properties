spring.application.name=hms

# MySQL database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate DDL-auto property (optional, but commonly used)
spring.jpa.hibernate.ddl-auto=update
# To show the SQL queries in the console (optional)
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#Context path
server.servlet.context-path=/api/v1

# To take user Ip
server.forward-headers-strategy=framework

#Security config
# spring.security.user.name=user
# spring.security.user.password=pass

#jwt secretKey
jwt.secret=${JWT_SECRET:change-this-in-env}

# Frontend appointment details route used in email notifications
app.appointment-details-base-url=${APPOINTMENT_DETAILS_BASE_URL}

# Stripe secretKey
stripe.secret.key=${STRIPE_SECRET_KEY}
