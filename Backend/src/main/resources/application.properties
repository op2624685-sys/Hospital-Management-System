spring.application.name=hms

# MySQL database connection properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hospital_management_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate DDL-auto property (optional, but commonly used)
spring.jpa.hibernate.ddl-auto=update
# To show the SQL queries in the console (optional)
spring.jpa.show-sql=true

#Context path
server.servlet.context-path=/api/v1

#Security config
# spring.security.user.name=user
# spring.security.user.password=pass

#jwt secretKey
jwt.secret=${JWT_SECRET:change-this-in-env}

# Frontend appointment details route used in email notifications
app.appointment-details-base-url=${APPOINTMENT_DETAILS_BASE_URL:http://localhost:5173/appointments}
