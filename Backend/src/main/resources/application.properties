spring.application.name=hms

# Postgresql database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP tuning to avoid "connection has been closed" warnings
# Set maxLifetime lower than the DB idle timeout
spring.datasource.hikari.max-lifetime=1500000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

# Hibernate DDL-auto property
spring.jpa.hibernate.ddl-auto=update
# To show the SQL queries in the console 
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway migrations for database migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#Context path for application versioning
server.servlet.context-path=/api/v1

# To take user Ip for implements the ratelimiting
server.forward-headers-strategy=framework

#Security config
# spring.security.user.name=user
# spring.security.user.password=pass

#jwt secretKey
jwt.secret=${JWT_SECRET:change-this-in-env}

# Frontend appointment details route used in email notifications
app.appointment-details-base-url=${APPOINTMENT_DETAILS_BASE_URL}

# Frontend payment redirect URL for Stripe checkout
app.payment.redirect-base-url=${PAYMENT_REDIRECT_BASE_URL:http://localhost:5173}

# Stripe configuration
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

#Cloudinary configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Security/CORS
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Include correlation id in logs
logging.pattern.level=%5p [traceId:%X{traceId}]

# ─── Aiven Managed Kafka (Easy Setup) ───────────────────────────────────────────
# 1. Update this with your Aiven "Service URI" (Host and Port only)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# 2. SSL definition mapping directly to downloaded Aiven files stored OUTSIDE the project
spring.ssl.bundle.pem.aiven.truststore.certificate=${KAFKA_CA_CERT_PATH}
spring.ssl.bundle.pem.aiven.keystore.certificate=${KAFKA_ACCESS_CERT_PATH}
spring.ssl.bundle.pem.aiven.keystore.private-key=${KAFKA_ACCESS_KEY_PATH}

# Apply the SSL bundle to Kafka
spring.kafka.ssl.bundle=aiven
spring.kafka.properties.security.protocol=SSL

# Producer defaults
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer defaults
spring.kafka.consumer.group-id=rating-aggregator
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hms.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.hms.event.RatingEvent

# Listener defaults
spring.kafka.listener.ack-mode=manual-immediate
spring.kafka.listener.concurrency=3

# ─── Redis Cache TTLs ──────────────────────────────────────────────────────────
# doctorRating cache: 30 minutes
app.redis.cache.ttl.doctorRating=30m
