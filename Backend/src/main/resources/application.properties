spring.application.name=hms

# Postgresql database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP tuning to avoid "connection has been closed" warnings
# Set maxLifetime lower than the DB idle timeout
spring.datasource.hikari.max-lifetime=1500000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

# Hibernate DDL-auto property
spring.jpa.hibernate.ddl-auto=update
# To show the SQL queries in the console 
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway migrations for database migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#Context path for application versioning
server.servlet.context-path=/api/v1

# To take user Ip for implements the ratelimiting
server.forward-headers-strategy=framework

#Security config
# spring.security.user.name=user
# spring.security.user.password=pass

#jwt secretKey
jwt.secret=${JWT_SECRET:change-this-in-env}

# Frontend appointment details route used in email notifications
app.appointment-details-base-url=${APPOINTMENT_DETAILS_BASE_URL}

# Frontend payment redirect URL for Stripe checkout
app.payment.redirect-base-url=${PAYMENT_REDIRECT_BASE_URL:http://localhost:5173}

# Stripe configuration
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# Security/CORS
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Include correlation id in logs
logging.pattern.level=%5p [traceId:%X{traceId}]
